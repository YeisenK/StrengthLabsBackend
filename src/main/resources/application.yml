spring:
  application:
    name: StrengthLabsAPI

  datasource:
    url: jdbc:postgresql://localhost:5432/strengthlabs
    username: stlabs
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

compute-engine:
  url: http://localhost:8001
